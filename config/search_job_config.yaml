collection:
  provider: jobspy
  platforms:
    - linkedin
  location: Germany
  search_terms:
    - machine learning engineer
    - data scientist
    - ai engineer
    - machine learning
  results_per_term: 20
  hours_old: 504
  linkedin_fetch_description: true
  translation:
    enabled: true
    provider: google
    target_language: zh-TW
    timeout_seconds: 60

include:
  title_keywords: []
  keywords: []
  locations:
    - Germany
    - remote
  work_modes:
    - remote
    - hybrid

exclude:
  title_keywords:
    - manager
  keywords:
    - unpaid
    - internship
    - mindrift
  language_requirements:
    - native german

sources:
  - linkedin
